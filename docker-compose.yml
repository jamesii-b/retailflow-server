services:
  app:
    build: .
    ports:
      - 8080:8080
      - 5000:5000
    volumes:
      - .:/src/app
    depends_on:
      - mongo-db
    restart: always
    container_name: cavetown-server-container
    environment:
      - MONGO_URI="mongodb://cavetown-db:27017/cavetown"
      - ADMIN_EMAIL="{ADMIN_EMAIL}"
      - EMAIL="{EMAIL}"
      - PASSWORD="{PASSWORD}"
      - PORT="{PORT}"
      - apolloPort="{apolloPort}"
  mongo-db:
    image: mongo:latest
    container_name: cavetown-db
    expose:
      - '27017'
    volumes:
      - ./data:/data/db
    ports:
      - 27017:27017
